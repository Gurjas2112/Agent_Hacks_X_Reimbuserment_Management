[options]
; =============================================================================
; odoo.conf — Odoo 19 Server Configuration
; =============================================================================
; Used inside the Docker container. Database credentials are passed via
; environment variables and override the values below.
; =============================================================================

; --- Database ---
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo_expense_2026
db_name = False
db_filter = .*

; --- Paths ---
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
data_dir = /var/lib/odoo

; --- Network ---
http_port = 8069
longpolling_port = 8072
proxy_mode = False

; --- Security ---
admin_passwd = admin_expense_2026
list_db = True

; --- Logging ---
log_level = info
log_handler = :INFO
logfile = 

; --- Performance ---
workers = 2
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

; --- Demo Data ---
without_demo = False
